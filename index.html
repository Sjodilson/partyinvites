<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Partyinvites – Skapa inbjudningskort</title>
  <meta name="description" content="Skapa vackra inbjudningskort till kalas. Välj mall, anpassa och dela!">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎉</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Dancing+Script:wght@400;500;600;700&family=Fredoka:wght@400;500;600&family=Inter:wght@300;400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Nunito:wght@400;600;700&family=Pacifico&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Poppins:wght@300;400;500;600;700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=5">
  <link rel="stylesheet" href="css/editor.css?v=5">
</head>
<body>
  <div id="app">

    <!-- ========== HEADER ========== -->
    <header class="app-header">
      <div class="header-left">
        <a href="#" class="app-logo" id="logo-link">
          <span class="logo-icon">🎉</span>
          <span class="logo-text" data-i18n="app.title">Partyinvites</span>
        </a>
      </div>
      <div class="header-right">
        <div class="lang-switcher" role="radiogroup" aria-label="Language">
          <button class="lang-btn active" data-lang="sv" aria-pressed="true">SV</button>
          <button class="lang-btn" data-lang="en" aria-pressed="false">EN</button>
        </div>
      </div>
    </header>

    <!-- ========== GALLERY VIEW ========== -->
    <main id="gallery-view" class="view active">
      <div class="gallery-header">
        <h2 class="gallery-title" data-i18n="gallery.title">Välj en mall</h2>
        <p class="gallery-subtitle" data-i18n="gallery.subtitle">Klicka på en mall för att börja designa ditt inbjudningskort</p>
      </div>

      <div class="gallery-search" id="gallery-search">
        <div class="search-input-group">
          <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="search-input" class="search-input" data-i18n-placeholder="gallery.search.placeholder" placeholder="Sök mallar... t.ex. bowling, halloween, baby shower">
          <button class="search-clear hidden" id="search-clear" aria-label="Rensa">✕</button>
        </div>
      </div>

      <nav class="gallery-categories" id="category-filter" aria-label="Filter templates"></nav>

      <div class="gallery-grid" id="template-grid"></div>
    </main>

    <!-- ========== EDITOR VIEW ========== -->
    <main id="editor-view" class="view">
      <div class="editor-toolbar">
        <button class="btn btn-ghost" id="btn-back">
          <span data-i18n="editor.back">← Tillbaka</span>
        </button>
        <div class="editor-actions">
          <button class="btn btn-icon" id="btn-undo" disabled data-i18n-title="editor.undo" title="Ångra">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
          </button>
          <button class="btn btn-icon" id="btn-redo" disabled data-i18n-title="editor.redo" title="Gör om">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.13-9.36L23 10"/></svg>
          </button>
          <div class="action-divider"></div>
          <button class="btn btn-primary" id="btn-export">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            <span data-i18n="editor.export">Exportera</span>
          </button>
        </div>
      </div>

      <div class="editor-layout">
        <div class="editor-preview-area">
          <div class="card-wrapper">
            <div class="card" id="invitation-card"></div>
          </div>
        </div>

        <aside class="editor-panel">
          <div class="panel-tabs" role="tablist">
            <button class="panel-tab active" data-tab="text" role="tab" aria-selected="true">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7V4h16v3"/><path d="M9 20h6"/><path d="M12 4v16"/></svg>
              <span data-i18n="editor.tab.text">Text</span>
            </button>
            <button class="panel-tab" data-tab="design" role="tab" aria-selected="false">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="13.5" cy="6.5" r="2.5"/><circle cx="17.5" cy="10.5" r="2.5"/><circle cx="8.5" cy="7.5" r="2.5"/><circle cx="6.5" cy="12.5" r="2.5"/><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12c0 1.821.487 3.53 1.338 5L12 22z"/></svg>
              <span data-i18n="editor.tab.design">Design</span>
            </button>
            <button class="panel-tab" data-tab="decor" role="tab" aria-selected="false">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
              <span data-i18n="editor.tab.decor">Dekor</span>
            </button>
          </div>

          <!-- Text Panel -->
          <div class="panel-content active" id="panel-text" data-panel="text" role="tabpanel"></div>

          <!-- Design Panel -->
          <div class="panel-content" id="panel-design" data-panel="design" role="tabpanel"></div>

          <!-- Decor Panel (stickers + image) -->
          <div class="panel-content" id="panel-decor" data-panel="decor" role="tabpanel"></div>
        </aside>
      </div>
    </main>

  </div>

  <!-- ========== EXPORT MODAL ========== -->
  <div class="modal-overlay hidden" id="export-modal" role="dialog" aria-modal="true">
    <div class="modal">
      <div class="modal-header">
        <h3 data-i18n="export.title">Exportera ditt kort</h3>
        <button class="modal-close" id="export-modal-close" aria-label="Stäng">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <button class="export-option" id="export-png">
          <span class="export-icon">🖼️</span>
          <div class="export-option-text">
            <strong data-i18n="export.png">Ladda ner som PNG</strong>
            <p data-i18n="export.pngDesc">Högupplöst bild – perfekt att skicka digitalt</p>
          </div>
          <svg class="export-arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
        <button class="export-option" id="export-pdf">
          <span class="export-icon">📄</span>
          <div class="export-option-text">
            <strong data-i18n="export.pdf">Ladda ner som PDF</strong>
            <p data-i18n="export.pdfDesc">Utskriftsvänlig PDF i A6-format</p>
          </div>
          <svg class="export-arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
      <div class="modal-status hidden" id="export-status">
        <div class="spinner"></div>
        <span data-i18n="export.generating">Genererar…</span>
      </div>
    </div>
  </div>

  <!-- ========== SCRIPTS ========== -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="js/i18n.js?v=5"></script>
  <script src="js/templates.js?v=5"></script>
  <script src="js/editor.js?v=5"></script>
  <script src="js/export.js?v=5"></script>
  <script src="js/app.js?v=5"></script>
</body>
</html>
